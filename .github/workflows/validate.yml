name: Validate Infrastructure
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  validate-compose:
    name: Validate Docker Compose files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Validate root docker-compose.yaml
        run: docker compose -f docker-compose.yaml config --quiet
      - name: Validate all service compose files
        run: |
          find . -name "docker-compose.yml" -o -name "docker-compose.yaml" | \
          grep -v "^\./docker-compose.yaml" | \
          while read f; do
            echo "-> Validating $f"
            docker compose -f "$f" config --quiet
          done
  check-secrets:
    name: Check for hardcoded secrets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install gitleaks
        run: |
          wget -q https://github.com/gitleaks/gitleaks/releases/download/v8.18.4/gitleaks_8.18.4_linux_x64.tar.gz
          tar -xzf gitleaks_8.18.4_linux_x64.tar.gz
          sudo mv gitleaks /usr/local/bin/
      - name: Run gitleaks
        run: gitleaks detect --source . --verbose
  lint-dockerfiles:
    name: Lint Dockerfiles
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Check for Dockerfiles
        id: check
        run: |
          count=$(find . -name "Dockerfile*" | wc -l)
          echo "count=$count" >> $GITHUB_OUTPUT
      - name: Run hadolint
        if: steps.check.outputs.count > 0
        uses: hadolint/hadolint-action@v3.1.0
        with:
          recursive: true
  notify-discord:
    name: Notify Discord on failure
    runs-on: ubuntu-latest
    needs: [validate-compose, check-secrets, lint-dockerfiles]
    if: failure()
    steps:
      - name: Send Discord notification
        run: |
          curl -X POST ${{ secrets.DISCORD_WEBHOOK }} \
          -H "Content-Type: application/json" \
          -d '{
            "embeds": [{
              "title": "Pipeline failed on titannium",
              "description": "A job failed on branch `${{ github.ref_name }}` after commit `${{ github.sha }}`.\n\n[View details](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})",
              "color": 15158332
            }]
          }'
