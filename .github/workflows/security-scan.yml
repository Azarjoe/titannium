name: Security Scan

on:
  workflow_dispatch:

jobs:
  scan-ports:
    name: Scan exposed ports
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run port scanner
        run: python security/scanner.py ${{ secrets.SERVER_IP }}
